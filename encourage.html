<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부모 격려 플래시카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: url('https://www.simjimind.co.kr/006b.webp') center center / cover no-repeat rgba(253,248,243,0.0);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 3rem;
    color: #3a2e28;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 1.75rem;
  }
  .title-wrap h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: #5c3d2e;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .title-wrap p {
    font-size: 12px;
    color: #b89080;
    letter-spacing: .02em;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }
  .tab-btn {
    padding: 7px 20px;
    border-radius: 20px;
    border: 1px solid #e8cfc0;
    background: rgba(255,255,255,0.75);
    color: #a07060;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: #c97d5a;
    color: #fff;
    border-color: #c97d5a;
  }

  .prog-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 1rem;
  }
  .prog-txt { font-size: 12px; color: #b89080; min-width: 48px; }
  .prog-bar {
    flex: 1; height: 3px;
    background: #f0ddd0;
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: #c97d5a;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .shf-btn {
    font-size: 12px; color: #b89080;
    background: none; border: none;
    cursor: pointer; text-decoration: underline;
    font-family: 'Noto Sans KR', sans-serif; padding: 0;
  }

  .card-area {
    width: 100%;
    max-width: 500px;
    height: 320px;
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 1.25rem;
    background: transparent;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform .6s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
    background: transparent;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 18px;
    padding: 1.75rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card-front {
    background: rgba(255,255,255,0.65);
    border: 1px solid #f0ddd0;
    box-shadow: 0 2px 16px rgba(180,120,80,.07);
  }
  .card-back {
    background: rgba(254,240,230,0.65);
    border: 1px solid #e8c8b0;
    box-shadow: 0 2px 16px rgba(180,120,80,.10);
    transform: rotateY(180deg);
  }

  .card-lbl {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .card-front .card-lbl { color: #c9a898; }
  .card-back .card-lbl { color: #c97d5a; }

  .card-txt {
    font-size: 15px;
    line-height: 1.85;
    word-break: keep-all;
    overflow-wrap: break-word;
    text-align: center;
  }
  .card-front .card-txt {
    font-family: 'Noto Sans KR', sans-serif;
    color: #5c3d2e;
  }
  .card-back .card-txt {
    font-family: 'Noto Serif KR', serif;
    color: #7a4030;
    font-size: 15.5px;
  }

  .card-desc {
    font-size: 11px;
    line-height: 1.75;
    color: #b07050;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #e8c8b0;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .blank {
    display: inline-block;
    width: 88px;
    border-bottom: 1.5px solid #c97d5a;
    margin: 0 3px;
    vertical-align: bottom;
  }

  .card-hint {
    font-size: 11px;
    color: #d4b0a0;
    text-align: center;
    margin-top: 16px;
  }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    max-width: 500px;
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 10px;
    border: 1px solid #e8cfc0;
    background: rgba(255,255,255,0.75);
    color: #a07060;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background .15s;
  }
  .nav-btn:hover { background: #fdf0e8; }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  .flip-btn {
    padding: 9px 24px;
    border-radius: 10px;
    border: 1px solid #c97d5a;
    background: #c97d5a;
    color: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background .15s;
  }
  .flip-btn:hover { background: #b86d4a; }

  .footer {
    margin-top: 2.5rem;
    font-size: 11.5px;
    color: #c9a898;
    text-align: center;
    letter-spacing: .02em;
  }
</style>
</head>
<body>

<div class="title-wrap">
  <h1>부모 격려 플래시카드</h1>
  <p>심리상담연구소 심지 · 연리지 부모교육</p>
</div>

<div class="tabs" id="tabs"></div>

<div class="prog-row">
  <span class="prog-txt" id="prog-txt">1 / 10</span>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
  <button class="shf-btn" onclick="shuffle()">↺ 섞기</button>
</div>

<div class="card-area" onclick="flipCard()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front">
      <div class="card-lbl">이렇게 말하고 싶을 때</div>
      <div class="card-txt" id="front-txt"></div>
      <div class="card-hint">격려의 언어로 표현해볼까요?</div>
    </div>
    <div class="card-face card-back">
      <div class="card-lbl">이렇게 말해볼 수 있어요</div>
      <div class="card-txt" id="back-txt"></div>
      <div class="card-desc" id="back-desc"></div>
    </div>
  </div>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="move(-1)">← 이전</button>
  <button class="flip-btn" onclick="flipCard()">뒤집기</button>
  <button class="nav-btn" id="next-btn" onclick="move(1)">다음 →</button>
</div>

const cats = Object.keys(DATA);
let curCat = cats[0], deck = [...DATA[curCat]], idx = 0, flipped = false;

function buildTabs() {
  const w = document.getElementById('tabs');
  w.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (c === curCat ? ' active' : '');
    b.textContent = c + ' (10)';
    b.onclick = () => { curCat = c; deck = [...DATA[c]]; idx = 0; flipped = false; buildTabs(); render(); };
    w.appendChild(b);
  });
}

function render() {
  const card = deck[idx];
  document.getElementById('front-txt').innerHTML = card.f.replace(/([.!?~]\s+)/g, '$1<br>');
  document.getElementById('back-txt').innerHTML = card.b.replace(/([.!?~]\s+)/g, '$1<br>');
  const descEl = document.getElementById('back-desc');
  if (card.d) {
    descEl.innerHTML = card.d.replace(/([.!?]\s+)/g, '$1<br>');
    descEl.style.display = 'block';
  } else {
    descEl.style.display = 'none';
  }
  document.getElementById('prog-txt').textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('prog-fill').style.width = ((idx + 1) / deck.length * 100) + '%';
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === deck.length - 1;
  document.getElementById('card-inner').classList.toggle('flipped', flipped);
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card-inner').classList.toggle('flipped', flipped);
}

function move(d) {
  const n = idx + d;
  if (n < 0 || n >= deck.length) return;
  idx = n; flipped = false; render();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; flipped = false; render();
}

buildTabs();
render();
</script>
</body>
</html>
